<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .chip {
        transform-origin: center;
        animation: floaty 3.6s ease-in-out infinite;
      }
      .chip.d0 { animation-delay: 0s; }
      .chip.d1 { animation-delay: 0.3s; }
      .chip.d2 { animation-delay: 0.6s; }
      .chip.d3 { animation-delay: 0.9s; }
      .chip.d4 { animation-delay: 1.2s; }
      .chip.d5 { animation-delay: 1.5s; }
      .chip.d6 { animation-delay: 1.8s; }
      .chip.d7 { animation-delay: 2.1s; }
      @keyframes floaty {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-10px); }
      }
      .label {
        font: 700 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        fill: #ffffff;
        text-anchor: middle;
      }
      .caption {
        font: 600 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        fill: #8E8E93;
        text-anchor: middle;
      }
    </style>
  </defs>

  <g class="chip d0">
    <rect x="18" y="20" width="84" height="84" rx="20" fill="#FFCC00"/>
    <text x="60" y="68" class="label">JS</text>
  </g>
  <text x="60" y="130" class="caption">JavaScript</text>

  <g class="chip d1">
    <rect x="126" y="20" width="84" height="84" rx="20" fill="#007AFF"/>
    <text x="168" y="68" class="label">TS</text>
  </g>
  <text x="168" y="130" class="caption">TypeScript</text>

  <g class="chip d2">
    <rect x="234" y="20" width="84" height="84" rx="20" fill="#30B0C7"/>
    <text x="276" y="68" class="label">⚛</text>
  </g>
  <text x="276" y="130" class="caption">React</text>

  <g class="chip d3">
    <rect x="342" y="20" width="84" height="84" rx="20" fill="#34C759"/>
    <text x="384" y="68" class="label">⬡</text>
  </g>
  <text x="384" y="130" class="caption">Node.js</text>

  <g class="chip d4">
    <rect x="450" y="20" width="84" height="84" rx="20" fill="#5856D6"/>
    <text x="492" y="68" class="label">PY</text>
  </g>
  <text x="492" y="130" class="caption">Python</text>

  <g class="chip d5">
    <rect x="558" y="20" width="84" height="84" rx="20" fill="#FF9500"/>
    <text x="600" y="68" class="label">DB</text>
  </g>
  <text x="600" y="130" class="caption">SQL</text>

  <g class="chip d6">
    <rect x="666" y="20" width="84" height="84" rx="20" fill="#FF2D55"/>
    <text x="708" y="68" class="label">BI</text>
  </g>
  <text x="708" y="130" class="caption">Power BI</text>

  <g class="chip d7">
    <rect x="774" y="20" width="84" height="84" rx="20" fill="#8E8E93"/>
    <text x="816" y="68" class="label">Git</text>
  </g>
  <text x="816" y="130" class="caption">Git</text>
</svg>
